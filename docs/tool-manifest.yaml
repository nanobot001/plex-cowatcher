project:
  name: replace-me
  classification: new_tool_friendly_project
  runtime_model: replace-me
  state:
    type: sqlite
    path: state/project.sqlite

tools:
  - name: project.status
    risk: public_read
    description: Return current project status.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.health
    risk: public_read
    description: Return current health summary.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.recent_events
    risk: public_read
    description: Return recent project events.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.recent_errors
    risk: trusted_read
    description: Return recent structured errors.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.tail_logs
    risk: trusted_read
    description: Return recent log lines from the project or a specific monitored logical source.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        lines:
          type: integer
          default: 100
        source:
          type: string
          description: Optional logical log source name, not a local file path.
    output_schema:
      type: object

  - name: project.watch_history
    risk: public_read
    description: Query normalized playback observations and watch history.
    input_schema:
      type: object
      properties:
        user:
          type: string
        media_type:
          type: string
        completed:
          type: boolean
        limit:
          type: integer
        offset:
          type: integer
    output_schema:
      type: object

  - name: project.watch_summary
    risk: public_read
    description: Query daily watch summaries and show progress.
    input_schema:
      type: object
      properties:
        user:
          type: string
        days:
          type: integer
    output_schema:
      type: object

  - name: project.viewing_sessions
    risk: public_read
    description: Group playback observations into contiguous viewing sessions.
    input_schema:
      type: object
      properties:
        user:
          type: string
        days:
          type: integer
        inactivity_gap:
          type: number
    output_schema:
      type: object

  - name: project.cowatching
    risk: public_read
    description: Infer co-watching using proximity and explicit confirmation.
    input_schema:
      type: object
      properties:
        days:
          type: integer
    output_schema:
      type: object
