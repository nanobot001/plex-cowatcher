project:
  name: plex-cowatcher
  classification: existing_local_service_with_tool_contracts
  runtime_model: pm2_managed_windows_local_node_service
  state:
    type: sqlite
    path: state/plex-cowatcher.sqlite

tools:
  - name: project.status
    risk: public_read
    description: Return current project status.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.health
    risk: public_read
    description: Return current health summary.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.recent_events
    risk: public_read
    description: Return recent project events.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.recent_errors
    risk: trusted_read
    description: Return recent structured errors.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.tail_logs
    risk: trusted_read
    description: Return recent log lines from the project or a specific monitored logical source.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        lines:
          type: integer
          default: 100
        source:
          type: string
          description: Optional logical log source name, not a local file path.
    output_schema:
      type: object

  - name: project.watch_history
    risk: public_read
    description: Query normalized playback observations and watch history.
    input_schema:
      type: object
      properties:
        user:
          type: string
        media_type:
          type: string
        completed:
          type: boolean
        limit:
          type: integer
        offset:
          type: integer
    output_schema:
      type: object

  - name: project.watch_summary
    risk: public_read
    description: Query daily watch summaries and show progress.
    input_schema:
      type: object
      properties:
        user:
          type: string
        days:
          type: integer
    output_schema:
      type: object

  - name: project.viewing_sessions
    risk: public_read
    description: Group playback observations into contiguous viewing sessions.
    input_schema:
      type: object
      properties:
        user:
          type: string
        days:
          type: integer
        inactivity_gap:
          type: number
    output_schema:
      type: object

  - name: project.cowatching
    risk: public_read
    description: Infer co-watching using proximity and explicit confirmation.
    input_schema:
      type: object
      properties:
        days:
          type: integer
    output_schema:
      type: object

  - name: project.audiobook_backfill
    risk: write_action
    description: Preview or apply resumable audiobook metadata linking and enrichment.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [local, enrich, all, hierarchy]
          default: all
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
        resume:
          type: boolean
          default: false
        batch_size:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
    output_schema:
      type: object

  - name: project.tautulli_backfill
    risk: write_action
    description: Preview or apply resumable, auditable Tautulli history ingestion and read reconciliation results.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        user:
          type: string
        page_size:
          type: integer
          default: 200
        run_id:
          type: string
        report:
          type: boolean
          default: false
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
    output_schema:
      type: object

  - name: project.audiobook_scan
    risk: write_action
    description: Proactively crawl Plex library tracks or receive Plex webhook triggers to index and enrich audiobooks.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        library:
          type: string
          default: Audiobooks
    output_schema:
      type: object

  - name: project.plex_historical_backfill
    risk: write_action
    description: Preview or apply exact-GUID Plex per-user historical movie last-view recovery before the configured cutoff.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        user:
          type: string
        rating_key:
          type: string
        plex_guid:
          type: string
        cutoff:
          type: string
          default: '2022-01-01T00:00:00.000Z'
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
    output_schema:
      type: object

  - name: project.archive_plex_view_recovery
    risk: write_action
    description: Preview or apply idempotent import of external Plex library movie view rows into archive-owned CoWatcher SQLite tables, linking exact matches to existing observations without copying them.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        plex_db:
          type: string
        limit:
          type: integer
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
    output_schema:
      type: object

  - name: project.plex_movie_identity_repair
    risk: write_action
    description: Preview or apply exact Plex GUID movie identity and stale-rating-key alias adoption in CoWatcher's local SQLite database.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
        actor:
          type: string
    output_schema:
      type: object

  - name: project.audiobook_import_chapters
    risk: write_action
    description: Import verified audiobook chapter boundaries from a JSON file.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        file_path:
          type: string
        apply:
          type: boolean
          default: false
    output_schema:
      type: object

  - name: project.audiobook_proof
    risk: write_action
    description: Inspect proof queue status, run one confirmed canary, or requeue one existing job.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [status, canary, requeue]
          default: status
        audiobook_id:
          type: integer
        job_id:
          type: integer
        apply:
          type: boolean
          default: false
        confirm:
          type: boolean
          default: false
    output_schema:
      type: object

