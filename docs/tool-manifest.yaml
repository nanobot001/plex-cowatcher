project:
  name: replace-me
  classification: new_tool_friendly_project
  runtime_model: replace-me
  state:
    type: sqlite
    path: state/project.sqlite

tools:
  - name: project.status
    risk: public_read
    description: Return current project status.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.health
    risk: public_read
    description: Return current health summary.
    input_schema:
      type: object
      additionalProperties: false
      properties: {}
    output_schema:
      type: object

  - name: project.recent_events
    risk: public_read
    description: Return recent project events.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.recent_errors
    risk: trusted_read
    description: Return recent structured errors.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          default: 7
        limit:
          type: integer
          default: 20
    output_schema:
      type: object

  - name: project.tail_logs
    risk: trusted_read
    description: Return recent log lines from the project or a specific monitored logical source.
    input_schema:
      type: object
      additionalProperties: false
      properties:
        lines:
          type: integer
          default: 100
        source:
          type: string
          description: Optional logical log source name, not a local file path.
    output_schema:
      type: object
